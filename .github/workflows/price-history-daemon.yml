name: Price history daemon

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/price-history-daemon.yml"
      - ".github/scripts/capture-price-history.mjs"
  workflow_dispatch:

concurrency:
  group: price-history-daemon
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Capture every 15 minutes
        env:
          PRICE_HISTORY_URL: https://www.ensarsarraf.com/api/capture_price_history.php
          PRICE_HISTORY_WRITE_KEY: ${{ secrets.PRICE_HISTORY_WRITE_KEY }}
        run: |
          for i in $(seq 1 23); do
            echo "Capture cycle $i / 23"
            node .github/scripts/capture-price-history.mjs || true
            if [ "$i" -lt 23 ]; then
              sleep 900
            fi
          done

      - name: Restart daemon
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/price-history-daemon.yml/dispatches \
            -d '{"ref":"main"}'
